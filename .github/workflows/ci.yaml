name: Continuous Integration - Hemangini

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest black
          # Navigate into Session4_Homework to find the requirements file
          cd Session4_Homework 
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          # Navigate into Session4_Homework so the src imports work perfectly
          cd session_4
          pytest tests/

      - name: Format code with black
        run: black .

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # The '|| echo' prevents the pipeline from failing if Black made no formatting changes
          git commit -m 'chore: format code with black' || echo "No changes to commit"
          git push origin $BRANCH_NAME